## 2025-12-01 SARBS
# Optimiert für DWM mit Animationen (picom-ftlabs-git)
#
# Wichtige Befehle:
# 'xprop | grep WM_CLASS'   # zeigt die class_g eines Fensters
# 'picom --diagnostics'     # zeigt alle aktiven Regeln

#######################################
#  Basis-Einstellungen                #
#######################################

# Schatten
shadow = true;

# Fading aktiviert - wird für Tag-Wechsel-Animationen benötigt
# Steuert den Überblend-Effekt beim Öffnen/Schließen/Wechseln
fading = true;
fade-in-step = 0.10;              # Einblend-Geschwindigkeit (0.01-1.0, höher = schneller)
fade-out-step = 0.10;             # Ausblend-Geschwindigkeit (0.01-1.0, höher = schneller)
fade-delta = 5;                  # Zeit zwischen Fade-Schritten in ms

# Runde Ecken - Hauptfeature
corner-radius = 15;

#######################################
#  Animationen (picom-ftlabs-git)     #
#######################################
#
# Verfügbare Animations-Typen:
#   fly-in            - Fenster fliegen aus zufälliger Richtung ein
#   maximize          - Fenster wachsen aus der Bildschirmmitte
#   minimize          - Fenster schrumpfen zur Bildschirmmitte
#   slide-in-center   - Fenster gleiten von oben-mitte an ihre Position
#   slide-out-center  - Fenster gleiten nach oben-mitte
#   slide-left        - Fenster gleiten von rechts nach links
#   slide-right       - Fenster gleiten von links nach rechts
#   slide-down        - Fenster gleiten von oben nach unten
#   slide-up          - Fenster gleiten von unten nach oben
#   squeeze           - Fenster klappen vertikal zusammen (Augen-Blinzel-Effekt)
#   squeeze-bottom    - Wie squeeze, aber von unten
#   zoom              - Fenster wachsen/schrumpfen von ihrem Zentrum
#
# Animationen aktivieren (mit --animations CLI-Flag oder hier)
animations = true;

# Physik-Parameter: Steuern das "Gefühl" der Animationen
# Höhere Steifigkeit = schnellere, direktere Bewegung
# Höhere Masse = trägere, langsamere Bewegung
# Höhere Dämpfung = weniger Nachschwingen/Überschießen
animation-stiffness-in-tag = 250;       # Geschwindigkeit beim Öffnen/Schließen im aktuellen Tag
                                         # (Standard: 125, höher = schneller, snappier)
animation-stiffness-tag-change = 150;    # Geschwindigkeit beim Tag-Wechsel
                                         # (Standard: 90, etwas langsamer für sanften Übergang)
animation-window-mass = 0.4;             # Trägheit der Fenster (Standard: 0.4, höher = schwerer)
animation-dampening = 18;                # Dämpfung/Reibung (Standard: 15, höher = weniger Bounce)
animation-clamping = true;               # Verhindert Überschießen der Animation (empfohlen!)

# Fenster öffnen - zoom passt gut zu DWM (dezent, aus dem Zentrum des Fensters)
# zoom oder fly-in
animation-for-open-window = "zoom";

# Fenster schließen/minimieren
# squeeze ist schnell und unauffällig
# minimize ist auch cool
animation-for-unmap-window = "minimize";

# Popup/Dialog-Fenster (z.B. dmenu, Tooltips) - slide-up für subtilen Effekt
animation-for-transient-window = "maximize";

# Tag-Wechsel: Fenster die den alten Tag verlassen
# minimize lässt sie zur Mitte schrumpfen (räumt visuell auf)
animation-for-prev-tag = "minimize";
enable-fading-prev-tag = true;           # Überblend-Effekt beim Verlassen (sanfter Übergang)

# Tag-Wechsel: Fenster die im neuen Tag erscheinen
# slide-in-center lässt sie elegant von oben eingleiten
animation-for-next-tag = "slide-in-center";
enable-fading-next-tag = true;           # Überblend-Effekt beim Erscheinen (sanfter Übergang)

# TUNING-TIPPS:
# - Zu langsam?  → animation-stiffness-in-tag erhöhen (z.B. 300)
# - Zu hektisch? → animation-stiffness-in-tag senken (z.B. 100)
# - Zu "bouncy"? → animation-dampening erhöhen (z.B. 25)
# - Zu steif?    → animation-dampening senken (z.B. 12) und animation-window-mass auf 0.3
# - Andere Stile testen: animation-for-open-window = "slide-down" oder "fly-in"

#######################################
# BLURRING - Komplett deaktiviert     #
#######################################
# Methoden: none, gaussian, box, kernel, dual_kawase
blur:
{
  method = "none";
};

# Alle blur-Einstellungen deaktiviert um RAM zu sparen
blur-background = false;
blur-background-fixed = false;

#######################################
#     Backend & Performance           #
#######################################

# Backend auswählen: `xrender`, `glx` oder `egl`
#   xrender - Software-Rendering, langsamer aber stabil (für VMs empfohlen)
#   glx     - OpenGL-basiert, beste Performance auf echter Hardware
#   egl     - Moderner OpenGL, experimental, manchmal Treiberprobleme
# WICHTIG: glx wird für flüssige Animationen benötigt!
backend = "glx";

# Performance-Einstellungen
vsync = true;                         # VSync aktivieren (verhindert Tearing)
use-damage = true;                    # Nur geänderte Bereiche neu rendern
unredir-if-possible = true;           # Compositor bei Vollbild-Apps umgehen (spart RAM)
detect-transient = true;
transparent-clipping = false;
glx-no-stencil = true;               # ~15% Performance-Boost bei GLX (empfohlen)
log-level = "warn";

#######################################
#  Opacity-Regeln (altes Format)      #
#######################################
# Format: "OPACITY:BEDINGUNG"
# OPACITY = 0-100 (Prozent)
# picom-ftlabs-git unterstützt NICHT das neue rules:()-Format!

opacity-rule = [
    # DWM Statusbar - immer 100% sichtbar
    "100:class_g = 'dwmbar'",
    "100:window_type = 'dock'",

    # Dmenu & Rofi - leichte Transparenz für Launcher
    "95:class_g = 'dmenu'",
    "95:class_g = 'Rofi'",
    "95:class_g = 'rofi'",

    # SARBS Terminal-Transparenz (WHITELIST-Ansatz)
    # Nur spezifische Terminal-Emulatoren bekommen Transparenz bei Inaktivität
    # Alle anderen Apps (Browser, GUI-Tools, etc.) bleiben 100% opacity
    "60:class_g = 'St' && !focused",                   # suckless terminal
    "60:class_g = 'st' && !focused",
    "60:class_g = 'st-256color' && !focused",
    "60:class_g = 'Alacritty' && !focused",             # alacritty
    "60:class_g = 'alacritty' && !focused",
    "60:class_g = 'kitty' && !focused",                  # kitty
    "60:class_g = 'Kitty' && !focused",
    "60:class_g = 'URxvt' && !focused",                  # rxvt-unicode
    "60:class_g = 'urxvt' && !focused",
    "60:class_g = 'XTerm' && !focused",                  # xterm
    "60:class_g = 'xterm' && !focused",
    "60:class_g = 'termite' && !focused",                # termite
    "60:class_g = 'Termite' && !focused",

    # Dunst - leichte Transparenz für Benachrichtigungen
    "95:class_g = 'Dunst'",

    # Vollbild-Apps immer 100%
    "100:fullscreen"
];

#####################################
#  Runde Ecken                      #
#####################################
corner-radius = 15;                     # Globale einstellung
corner-radius-rules = [
    "7:class_g = 'dwmbar'",             # 20px for Firefox
    "0:class_g = 'dmenu'",
    "20:class_g = 'Rofi'",
    "0:window_type = 'dock'",           # No rounding for docks
    "10:window_type = 'dock'",          # 10px for docks (overrides blacklist)
    "10:class_g = 'Dunst'"

];
rounded-corners-exclude = [             # Blacklist (set to 0, overridden by rules)
    "window_type = 'desktop'",
    "window_type = 'dock'",             # No rounding for docks
    "class_g = 'mpv'"                   # mpv - keine runden Ecken (Vollbild-Video)
];


#######################################
#  Fenstertyp-Einstellungen           #
#######################################
# Steuert Verhalten pro EWMH-Fenstertyp (dock, tooltip, popup, etc.)
wintypes:
{
    tooltip = { fade = true; shadow = false; opacity = 0.85; focus = true; };
    dock = { shadow = false; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.90; };
    dropdown_menu = { opacity = 0.90; };
};
